BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-dashboard"
BBFILE_PATTERN_meta-dashboard = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-dashboard = "10"

# Requires: OE-core + meta-qt5 (provides the "qt5" collection)
LAYERDEPENDS_meta-dashboard = "core qt5-layer"

# Tested against Yocto 5.0 Scarthgap
LAYERSERIES_COMPAT_meta-dashboard = "scarthgap"
