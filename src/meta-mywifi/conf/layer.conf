# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-mywifi"
BBFILE_PATTERN_meta-mywifi = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-mywifi = "6"

LAYERDEPENDS_meta-mywifi = "core"
LAYERSERIES_COMPAT_meta-mywifi = "scarthgap"
